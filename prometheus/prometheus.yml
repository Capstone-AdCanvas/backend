global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus-data'
    static_configs:
      - targets: ['prometheus:9090']
#  - job_name: 'springboot'
#    static_configs:
#      - targets: [ 'backend-app:8080' ]
  - job_name: 'mysql'
    static_configs:
      - targets: [ 'mysql-exporter:9104' ]
  - job_name: 'node'
    static_configs:
      - targets: [ 'node-exporter:9100' ]
  - job_name: 'cadvisor-data'
    static_configs:
      - targets: [ 'cadvisor:8080' ]